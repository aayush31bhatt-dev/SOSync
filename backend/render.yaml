services:
  - type: web
    name: sosync-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: AUTH_DB_BACKEND
        value: mongodb
      - key: AUTH_DB_STRICT_BACKEND
        value: "false"
      - key: MONGODB_DB_NAME
        value: sosync
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: SMARTCOMMUNITY_STRICT_DB_PATH
        value: "false"
      - key: AUTH_DEBUG_RESET_LINKS
        value: "false"
      - key: SMARTCOMMUNITY_LOW_MEMORY_MODE
        value: "true"
      - key: SMARTCOMMUNITY_MAX_INCIDENTS
        value: "30000"
      - key: SMARTCOMMUNITY_ENABLE_DBSCAN
        value: "false"
      - key: SMARTCOMMUNITY_ENABLE_MODEL_FILES
        value: "false"
      - key: SMARTCOMMUNITY_MAX_HEATMAP_POINTS
        value: "12000"
      - key: SMARTCOMMUNITY_EVIDENCE_DIR
        value: /var/data/evidence_uploads
    disk:
      name: sosync-data
      mountPath: /var/data
      sizeGB: 1
