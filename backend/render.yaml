services:
  - type: web
    name: sosync-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /docs
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: SMARTCOMMUNITY_DB_PATH
        value: /var/data/smartcommunity.db
      - key: AUTH_DEBUG_RESET_LINKS
        value: "false"
    disk:
      name: sosync-data
      mountPath: /var/data
      sizeGB: 1
